<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BilimBox — Menyu</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1280px; height: 720px;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: #0a0a1a;
    user-select: none;
    transform-origin: top left;
    position: relative;
  }

  /* Orqa fon */
  .bg {
    position: fixed; inset: 0;
    background-image: url('assets/bg_kirish.jpg');
    background-size: cover;
    background-position: center;
    filter: brightness(0.45);
    z-index: 0;
  }

  /* Nebula overlay */
  .overlay {
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 15% 50%, rgba(120,60,220,0.2) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 20%, rgba(40,130,255,0.18) 0%, transparent 55%),
      radial-gradient(ellipse at 50% 90%, rgba(200,50,150,0.1) 0%, transparent 50%);
    z-index: 1;
  }

  /* Titlebar */
  .titlebar {
    position: fixed; top: 0; left: 0; right: 0;
    height: 40px;
    -webkit-app-region: drag;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
  }

  .titlebar-left {
    display: flex; align-items: center; gap: 10px;
    -webkit-app-region: no-drag;
  }

  .app-name {
    font-size: 16px;
    font-weight: 700;
    background: linear-gradient(135deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 1px;
  }

  .titlebar-right {
    display: flex; align-items: center; gap: 8px;
    -webkit-app-region: no-drag;
  }

  .salom {
    font-size: 13px;
    color: rgba(180,200,255,0.7);
    margin-right: 12px;
  }

  .titlebar button {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.2s;
  }
  .titlebar button:hover { opacity: 0.85; transform: scale(1.15); }
  .btn-close { background: #ff5f57; }
  .btn-min   { background: #febc2e; } .btn-max { background: #78c3ff; }
  .btn-max   { background: #78c3ff; }
  .btn-max   { background: #78c3ff; }

  /* Header chiziq */
  .header-line {
    position: fixed; top: 40px; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(100,150,255,0.3), transparent);
    z-index: 99;
  }

  /* Sarlavha */
  .sarlavha {
    position: absolute;
    top: 60px; left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    text-align: center;
  }

  .sarlavha h2 {
    font-size: 18px;
    color: rgba(180,210,255,0.65);
    font-weight: 400;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* Grid */
  .grid {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -48%);
    z-index: 10;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 22px;
    padding: 10px;
  }

  /* Tugma */
  .btn {
    width: 230px;
    height: 118px;
    border-radius: 24px;
    border: 1px solid rgba(255,255,255,0.13);
    background: rgba(12, 18, 45, 0.52);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    position: relative;
    overflow: hidden;
    transition:
      transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
      box-shadow 0.35s ease,
      border-color 0.3s ease,
      background 0.3s ease;
    box-shadow:
      0 4px 20px rgba(0,0,0,0.4),
      inset 0 1px 0 rgba(255,255,255,0.08);
  }

  /* Har bir tugma rangi */
  .btn-kutubxona  { --glow: rgba(59,130,246,0.5);  --edge: #3b82f6; }
  .btn-matematika { --glow: rgba(34,197,94,0.5);   --edge: #22c55e; }
  .btn-zakovat    { --glow: rgba(168,85,247,0.5);  --edge: #a855f7; }
  .btn-evrika     { --glow: rgba(251,191,36,0.5);  --edge: #fbbf24; }
  .btn-reyting    { --glow: rgba(239,68,68,0.5);   --edge: #ef4444; }
  .btn-sozlamalar { --glow: rgba(148,163,184,0.4); --edge: #94a3b8; }

  /* Yuqori chiziq (rang belgisi) */
  .btn::before {
    content: '';
    position: absolute;
    top: 0; left: 15%; right: 15%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--edge), transparent);
    border-radius: 0 0 4px 4px;
    opacity: 0.8;
    transition: opacity 0.3s, left 0.3s, right 0.3s;
  }

  /* Sheen effekti */
  .btn::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
    transform: skewX(-20deg);
    transition: left 0.6s ease;
  }

  /* Hover */
  .btn:hover {
    transform: translateY(-10px) scale(1.06);
    border-color: rgba(255,255,255,0.25);
    background: rgba(15, 22, 55, 0.7);
    box-shadow:
      0 20px 50px rgba(0,0,0,0.5),
      0 0 30px var(--glow),
      inset 0 1px 0 rgba(255,255,255,0.18);
  }

  .btn:hover::before {
    left: 5%; right: 5%;
    opacity: 1;
  }

  .btn:hover::after { left: 120%; }

  /* Bosilganda */
  .btn:active {
    transform: translateY(-4px) scale(1.02);
    box-shadow:
      0 8px 24px rgba(0,0,0,0.4),
      0 0 16px var(--glow);
    transition: transform 0.1s, box-shadow 0.1s;
  }

  .btn-icon {
    font-size: 32px;
    line-height: 1;
    filter: drop-shadow(0 0 8px var(--edge));
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.3s;
  }

  .btn:hover .btn-icon {
    transform: scale(1.15) translateY(-2px);
    filter: drop-shadow(0 0 14px var(--edge));
  }

  .btn-text {
    font-size: 14px;
    font-weight: 600;
    color: rgba(220, 235, 255, 0.9);
    letter-spacing: 0.5px;
    transition: color 0.3s;
  }

  .btn:hover .btn-text {
    color: #fff;
  }

  /* Particle dots (dekor) */
  .particles {
    position: fixed; inset: 0;
    z-index: 2;
    pointer-events: none;
  }

  .dot {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.6);
    animation: twinkle var(--d, 3s) ease-in-out infinite;
    animation-delay: var(--delay, 0s);
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.1; transform: scale(1); }
    50%       { opacity: 0.7; transform: scale(1.3); }
  }
</style>
<link rel="stylesheet" href="../bridge/mobile-overrides.css">
<script src="../bridge/file-manifest.js"></script>
<script src="../bridge/bridge.js"></script>
<script>window.BilimBoxBridge.init('/ui');</script>
</head>
<body>

<div class="bg"></div>
<div class="overlay"></div>

<!-- Yulduzlar -->
<div class="particles" id="particles"></div>

<!-- Titlebar -->
<div class="titlebar">
  <div class="titlebar-left">
    <span class="app-name">✦ BilimBox</span>
  </div>
  <div class="titlebar-right">
    <span class="salom" id="salom">Salom! 👋</span>
    <button class="btn-min" onclick="ipcRenderer.invoke('minimize-app')"></button>
    <button class="btn-max" onclick="ipcRenderer.invoke('toggle-maximize-app')"></button>
    <button class="btn-max" onclick="ipcRenderer.invoke('toggle-maximize-app')"></button>
    <button class="btn-close" onclick="ipcRenderer.invoke('close-app')"></button>
  </div>
</div>
<div class="header-line"></div>

<!-- Sarlavha -->
<div class="sarlavha">
  <h2>Bo'limni tanlang</h2>
</div>

<!-- Grid -->
<div class="grid">

  <button class="btn btn-kutubxona" onclick="goto('kutubxona')">
    <span class="btn-icon">📚</span>
    <span class="btn-text">Kutubxona</span>
  </button>

<button class="btn btn-matematika" onclick="goto('oyinlar')">
    <span class="btn-icon">🎮</span>
    <span class="btn-text">O'yinlar</span>
</button>

  <button class="btn btn-zakovat" onclick="goto('zakovat')">
    <span class="btn-icon">🧠</span>
    <span class="btn-text">Zakovat</span>
  </button>

  <button class="btn btn-evrika" onclick="goto('evrika')">
    <span class="btn-icon">💡</span>
    <span class="btn-text">Evrika</span>
  </button>

  <button class="btn btn-reyting" onclick="goto('reyting')">
    <span class="btn-icon">🏆</span>
    <span class="btn-text">Reyting</span>
  </button>

  <button class="btn btn-sozlamalar" onclick="goto('sozlamalar')">
    <span class="btn-icon">⚙️</span>
    <span class="btn-text">Sozlamalar</span>
  </button>

</div>

<script>
  const { ipcRenderer } = require('electron');

  // Ismni ko'rsatish
  ipcRenderer.invoke('get-ism').then(ism => {
    if (ism) document.getElementById('salom').textContent = `Salom, ${ism} 👋`;
  });

  // Bo'limga o'tish
  function goto(page) {
    ipcRenderer.invoke('goto', page);
  }

  // Yulduzlar yaratish
  const container = document.getElementById('particles');
  for (let i = 0; i < 60; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot';
    const size = Math.random() * 2.5 + 0.5;
    dot.style.cssText = `
      width: ${size}px;
      height: ${size}px;
      left: ${Math.random() * 100}%;
      top: ${Math.random() * 100}%;
      --d: ${2 + Math.random() * 4}s;
      --delay: ${Math.random() * 4}s;
      opacity: ${Math.random() * 0.5};
    `;
    container.appendChild(dot);
  }

  function fitWindow() {
    const scale = Math.min(window.innerWidth / 1280, window.innerHeight / 720);
    document.body.style.transform = `scale(${scale})`;
    document.body.style.marginLeft = `${Math.max(0, (window.innerWidth - 1280 * scale) / 2)}px`;
    document.body.style.marginTop = `${Math.max(0, (window.innerHeight - 720 * scale) / 2)}px`;
  }

  window.addEventListener('resize', fitWindow);
  fitWindow();
</script>
</body>
</html>
