<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BilimBox</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1280px; height: 720px;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: #0a0a1a;
    transform-origin: top left;
    position: relative;
  }

  /* Orqa fon */
  .bg {
    position: fixed; inset: 0;
    background-image: url('assets/bg_kirish.jpg');
    background-size: cover;
    background-position: center;
    filter: brightness(0.6);
    z-index: 0;
  }

  /* Yulduzli overlay */
  .overlay {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 20% 50%, rgba(100,50,200,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(50,150,255,0.15) 0%, transparent 60%);
    z-index: 1;
  }

  /* Titlebar */
  .titlebar {
    position: fixed; top: 0; left: 0; right: 0;
    height: 36px;
    -webkit-app-region: drag;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 0 12px;
    gap: 8px;
  }

  .titlebar button {
    -webkit-app-region: no-drag;
    width: 14px; height: 14px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .titlebar button:hover { opacity: 0.8; }
  .btn-close { background: #ff5f57; }
  .btn-min   { background: #febc2e; }
  .btn-max   { background: #78c3ff; }

  /* Markaziy karta */
  .card {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    width: 420px;
    padding: 48px 40px 40px;
    border-radius: 28px;
    background: rgba(10, 15, 40, 0.55);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.12);
    box-shadow:
      0 8px 32px rgba(0,0,0,0.5),
      inset 0 1px 0 rgba(255,255,255,0.15),
      0 0 60px rgba(80,120,255,0.1);
    animation: fadeIn 0.8s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translate(-50%, -48%); }
    to   { opacity: 1; transform: translate(-50%, -50%); }
  }

  .logo {
    text-align: center;
    margin-bottom: 8px;
  }

  .logo h1 {
    font-size: 42px;
    font-weight: 800;
    background: linear-gradient(135deg, #60a5fa, #a78bfa, #60a5fa);
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 3s infinite linear;
  }

  @keyframes shimmer {
    0%   { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
  }

  .logo p {
    font-size: 13px;
    color: rgba(180,200,255,0.6);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .divider {
    width: 60px; height: 2px;
    background: linear-gradient(90deg, transparent, #60a5fa, transparent);
    margin: 20px auto;
    border-radius: 2px;
  }

  label {
    display: block;
    font-size: 13px;
    color: rgba(180,200,255,0.7);
    margin-bottom: 10px;
    letter-spacing: 0.5px;
  }

  .input-wrap {
    position: relative;
    margin-bottom: 8px;
  }

  input[type="text"] {
    width: 100%;
    padding: 14px 18px;
    border-radius: 14px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    color: #fff;
    font-size: 15px;
    outline: none;
    transition: all 0.3s;
    font-family: 'Segoe UI', sans-serif;
  }

  input[type="text"]:focus {
    border-color: rgba(96,165,250,0.6);
    background: rgba(255,255,255,0.1);
    box-shadow: 0 0 0 3px rgba(96,165,250,0.15),
                inset 0 1px 0 rgba(255,255,255,0.1);
  }

  input[type="text"]::placeholder { color: rgba(255,255,255,0.3); }

  .xato {
    font-size: 12px;
    color: #f87171;
    min-height: 18px;
    margin-bottom: 16px;
    padding-left: 4px;
  }

  .btn-kirish {
    width: 100%;
    padding: 15px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #3b82f6, #7c3aed);
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 24px rgba(59,130,246,0.4);
  }

  .btn-kirish::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    transition: left 0.5s;
  }

  .btn-kirish:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(59,130,246,0.5);
  }

  .btn-kirish:hover::before { left: 100%; }

  .btn-kirish:active {
    transform: translateY(0);
  }
</style>
<link rel="stylesheet" href="../bridge/mobile-overrides.css">
<script src="../bridge/file-manifest.js"></script>
<script src="../bridge/bridge.js"></script>
<script>window.BilimBoxBridge.init('/ui');</script>
</head>
<body>

<div class="bg"></div>
<div class="overlay"></div>

<!-- Titlebar -->
<div class="titlebar">
  <button class="btn-min" onclick="ipcRenderer.invoke('minimize-app')"></button>
  <button class="btn-max" onclick="ipcRenderer.invoke('toggle-maximize-app')"></button>
  <button class="btn-close" onclick="ipcRenderer.invoke('close-app')"></button>
</div>

<!-- Karta -->
<div class="card">
  <div class="logo">
    <h1>BilimBox</h1>
    <p>bir quti — cheksiz bilim</p>
  </div>
  <div class="divider"></div>

  <label>Ismingizni kiriting</label>
  <div class="input-wrap">
    <input type="text" id="ism" placeholder="Masalan: Begzod" maxlength="30" autofocus />
  </div>
  <div class="xato" id="xato"></div>

  <button class="btn-kirish" onclick="kirish()">Kirish &nbsp;→</button>
</div>

<script>
  const { ipcRenderer } = require('electron');

  ipcRenderer.invoke('get-ism').then(ism => {
    if (ism) {
      window.location.replace('/ui/menu.html');
    }
  });

  document.getElementById('ism').addEventListener('keydown', e => {
    if (e.key === 'Enter') kirish();
  });

  function kirish() {
    const ism = document.getElementById('ism').value.trim();
    const xato = document.getElementById('xato');

    if (ism.length < 2) {
      xato.textContent = '⚠ Ism kamida 2 harf bo\'lishi kerak!';
      return;
    }
    if (ism.length > 30) {
      xato.textContent = '⚠ Ism juda uzun!';
      return;
    }

    xato.textContent = '';
    ipcRenderer.invoke('save-ism', ism);
  }

  function fitWindow() {
    const scale = Math.min(window.innerWidth / 1280, window.innerHeight / 720);
    document.body.style.transform = `scale(${scale})`;
    document.body.style.marginLeft = `${Math.max(0, (window.innerWidth - 1280 * scale) / 2)}px`;
    document.body.style.marginTop = `${Math.max(0, (window.innerHeight - 720 * scale) / 2)}px`;
  }

  window.addEventListener('resize', fitWindow);
  fitWindow();
</script>
</body>
</html>
